# Commands manifest — lg5-spring-agent-os bundle
# Slash commands that drive repeatable workflow tasks.
# Format: each command is a single .md file at the root of commands/ with
# YAML frontmatter (description, argument-hint, allowed-tools) and a body
# that is the prompt/instructions injected into the agent when invoked.
#
# CI validates that every entry below maps 1:1 to a file on disk and that
# every file declares the required frontmatter keys.
#
# Two categories:
#   - sdd-*       : drive the SDD workflow phases (Specify/Plan/Tasks/Implement)
#   - building blocks (no prefix) : invoked from inside /sdd-implement to
#                                   actually generate code

bundle:
  name: lg5-spring-agent-os
  version: 4.3.0
  lg5-spring-sha: d0d754a

commands:
  # SDD workflow commands
  - name: sdd-intent
    file: sdd-intent.md
    version: 0.1.0
    category: sdd
    description: (Optional) Convert an informal idea into a one-page intent.md framing the problem before /sdd-specify.
  - name: sdd-quick
    file: sdd-quick.md
    version: 0.1.0
    category: sdd
    description: Quick-path for trivial changes (1 endpoint, 1 entity, 1 listener, 1 field, 1 config). Produces a compressed quick-spec.md and goes directly to /sdd-implement. /sdd-verify remains mandatory. Rejects sagas, new outboxes, new aggregates, new Avro schemas, multi-module changes.
  - name: sdd-specify
    file: sdd-specify.md
    version: 0.2.0
    category: sdd
    description: Convert an informal product prompt (or an approved intent.md) into a functional PRD (technology-free).
  - name: sdd-plan
    file: sdd-plan.md
    version: 0.2.0
    category: sdd
    description: Generate plan.md + ADRs (architecture only — data-model now belongs to /sdd-design) from an approved PRD.
  - name: sdd-design
    file: sdd-design.md
    version: 0.1.0
    category: sdd
    description: Produce design.md + data-model.md with concrete contracts, schemas, JPA, configs, module graph from approved Plan.
  - name: sdd-tasks
    file: sdd-tasks.md
    version: 0.2.0
    category: sdd
    description: Decompose an approved Design into atomic TASK-NNN with Given/When/Then AC.
  - name: sdd-implement
    file: sdd-implement.md
    version: 0.1.0
    category: sdd
    description: Execute ONE task (write code + tests + commit). Loops by re-invocation.
  - name: sdd-verify
    file: sdd-verify.md
    version: 0.1.0
    category: sdd
    description: Cross-check every PRD AC against test evidence. Gate decision blocks spec closure unless overridden by tech-debt ADR.
  - name: sdd-orchestrate
    file: sdd-orchestrate.md
    version: 0.1.0
    category: sdd
    description: Inspect a spec's state and recommend the next SDD phase command. Read-only helper.

  # Building-block commands (invoked from inside /sdd-implement)
  - name: scaffold-service
    file: scaffold-service.md
    version: 0.1.0
    category: building-block
    description: Scaffold a new microservice from the blank-service skeleton.
  - name: add-saga
    file: add-saga.md
    version: 0.1.0
    category: building-block
    description: Add an end-to-end SagaStep (publisher + listener + outbox + scheduler).
  - name: add-outbox
    file: add-outbox.md
    version: 0.1.0
    category: building-block
    description: Add a Transactional Outbox (entity + DDL + helper + scheduler) for one event type.
  - name: add-kafka-listener
    file: add-kafka-listener.md
    version: 0.1.0
    category: building-block
    description: Add a batch Kafka listener with NO-OP exception handling per RULE-010.
  - name: scaffold-ci-cd
    file: scaffold-ci-cd.md
    version: 0.1.0
    category: building-block
    description: Scaffold the canonical CI/CD pipeline (workflow + composite action + API docs + Allure) into a consumer service.
  - name: scaffold-docs
    file: scaffold-docs.md
    version: 0.1.0
    category: building-block
    description: Scaffold the unified VitePress documentation site (docs/site/ aggregator + 6 CI jobs + Firebase config) into a consumer service.
  - name: add-rest-endpoint
    file: add-rest-endpoint.md
    version: 0.1.0
    category: building-block
    description: Add a REST endpoint (controller method + DTOs + service port + handler + mapper + OpenAPI fragment + IT). Idiomatic per RULE-003/004/005/006/012.
  - name: add-jpa-entity
    file: add-jpa-entity.md
    version: 0.1.0
    category: building-block
    description: Add a JPA aggregate (domain entity + value-object id + repository port + JPA entity + Spring Data repo + adapter + MapStruct mapper + Liquibase changelog + IT). Idiomatic per RULE-003/004/015/016.
