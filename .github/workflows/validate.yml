name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run bundle validator (artifact-side checks)
        run: bash scripts/validate.sh
      - name: Run install-output lint (regression test for #15)
        run: bash scripts/validate.sh --install
