name: Release Automation

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  release:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract and finalize version
        id: get_version
        run: |
          BASE_VERSION=$(grep -m 1 'version:' manifest.yaml | awk '{print $2}')
          TAG_NAME="v$BASE_VERSION"
          
          # Check if tag already exists in the remote
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists. Appending short SHA..."
            SHORT_SHA=$(git rev-parse --short HEAD)
            FINAL_VERSION="$BASE_VERSION.$SHORT_SHA"
          else
            FINAL_VERSION="$BASE_VERSION"
          fi
          
          echo "VERSION=$FINAL_VERSION" >> $GITHUB_OUTPUT
          echo "Final version: $FINAL_VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Release v${{ steps.get_version.outputs.VERSION }}
            
            Automated release triggered by merged PR #${{ github.event.pull_request.number }} with 'release' label.
            
            ### Changes
            ${{ github.event.pull_request.title }}
            
            See [PR #${{ github.event.pull_request.number }}](${{ github.event.pull_request.html_url }}) for full details.
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
