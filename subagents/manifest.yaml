# Subagents manifest — lg5-spring-agent-os bundle
# Specialized subagents the orchestrator agent can spawn for delegated work.
# Format: each subagent is a single .md file at the root of subagents/ with
# YAML frontmatter (description, tools, model) and a body that is the
# system prompt of the subagent.
#
# CI validates that every entry below maps 1:1 to a file on disk and that
# every file declares the required frontmatter keys.

bundle:
  name: lg5-spring-agent-os
  version: 4.2.0
  lg5-spring-sha: d0d754a

subagents:
  - name: lg5-code-reviewer
    file: lg5-code-reviewer.md
    version: 0.1.1
    description: Reviews diffs against the 18 hard rules; cites violations by RULE-ID.
  - name: lg5-test-generator
    file: lg5-test-generator.md
    version: 0.1.1
    description: Generates IT/ATDD test scaffolds following RULE-012/013 patterns.
  - name: lg5-ci-cd-engineer
    file: lg5-ci-cd-engineer.md
    version: 0.1.1
    description: Specialist for GitHub Actions CI/CD on lg5-spring (workflow, composite Maven-creds action, API doc sites, Allure, supply-chain hardening).
  - name: sdd-intender
    file: sdd-intender.md
    version: 0.1.0
    description: SDD Intent-phase subagent (optional first phase). Converts an informal idea into a one-page intent.md framing the problem before a PRD is written. Pairs with /sdd-intent.
  - name: sdd-quicker
    file: sdd-quicker.md
    version: 0.1.0
    description: SDD Quick-path subagent. Produces a compressed quick-spec.md (~40 lines) for trivial changes that don't justify the full 7-phase workflow. Enforces strict eligibility — rejects sagas, new outboxes, new aggregates, new Avro schemas, multi-module changes. Pairs with /sdd-quick. /sdd-verify remains mandatory.
  - name: sdd-specifier
    file: sdd-specifier.md
    version: 0.2.0
    description: SDD Specify-phase subagent. Converts an informal feature prompt (or approved intent.md) into a tech-free PRD under docs/specs/<NNN-slug>/prd.md. Pairs with /sdd-specify.
  - name: sdd-planner
    file: sdd-planner.md
    version: 0.3.0
    description: SDD Plan-phase subagent. Generates plan.md + ADRs (architecture only — detailed design now belongs to sdd-designer) from an approved PRD. Pairs with /sdd-plan.
  - name: sdd-designer
    file: sdd-designer.md
    version: 0.1.0
    description: SDD Design-phase subagent. Reads an approved Plan + ADRs and produces design.md + data-model.md with concrete class signatures, REST contracts, Avro schemas, JPA model, configs, and module dependency graph. Sits between sdd-planner (architecture) and sdd-tasker (atomic backlog). Pairs with /sdd-design.
  - name: sdd-tasker
    file: sdd-tasker.md
    version: 0.2.0
    description: SDD Tasks-phase subagent. Decomposes an approved Design into atomic TASK-NNN with Given/When/Then AC. Pairs with /sdd-tasks.
  - name: sdd-implementer
    file: sdd-implementer.md
    version: 0.1.0
    description: SDD Implement-phase subagent. Executes ONE TASK per invocation (code + tests + lg5-code-reviewer + commit). Pairs with /sdd-implement.
  - name: sdd-verifier
    file: sdd-verifier.md
    version: 0.1.0
    description: SDD Verify-phase subagent. Cross-checks every PRD AC against test evidence after all TASKs are done. Produces verify-report.md with gate decision. Pairs with /sdd-verify.
  - name: sdd-orchestrator
    file: sdd-orchestrator.md
    version: 0.1.0
    description: SDD meta-subagent. Inspects spec state and dispatches to the right phase subagent. Never produces feature artifacts. Pairs with /sdd-orchestrate.
