# Specs manifest — lg5-spring-agent-os bundle
# Spec-driven workflow templates and example specs.
#
# Format conventions:
#   - Templates live under templates/ and are named <name>-template.md.
#   - Example specs live under examples/<feature-name>/ as a folder per feature.
#   - Every template + example file has YAML frontmatter (kind, version,
#     description) so CI can validate consistency.

bundle:
  name: lg5-spring-agent-os
  version: 4.1.0
  lg5-spring-sha: d0d754a

specs:
  # Templates
  - name: intent-template
    file: templates/intent-template.md
    kind: template
    version: 0.1.0
    description: Pre-PRD intent one-pager. Captures the WHY and the problem framing before /sdd-specify. Used by /sdd-intent. Optional but recommended.
  - name: quick-spec-template
    file: templates/quick-spec-template.md
    kind: template
    version: 0.1.0
    description: Compressed single-page spec (~40 lines) for trivial changes (1 endpoint, 1 entity, 1 listener, 1 field, 1 config). Replaces Specify+Plan+Design+Tasks. Used by /sdd-quick. Verify remains mandatory.
  - name: prd-template
    file: templates/prd-template.md
    kind: template
    version: 0.2.0
    description: Functional PRD for an lg5-spring microservice or feature. Used by /sdd-specify.
  - name: adr-template
    file: templates/adr-template.md
    kind: template
    version: 0.2.0
    description: Lightweight ADR template aware of the lg5-spring constitution.
  - name: plan-template
    file: templates/plan-template.md
    kind: template
    version: 0.1.0
    description: Technical plan derived from a PRD + ADRs. Used by /sdd-plan.
  - name: design-template
    file: templates/design-template.md
    kind: template
    version: 0.1.0
    description: Detailed technical design (class signatures, REST/Kafka contracts, JPA, configs, module graph) from an approved Plan. Used by /sdd-design. Consumed by /sdd-tasks.
  - name: data-model-template
    file: templates/data-model-template.md
    kind: template
    version: 0.1.0
    description: Concrete data shapes (aggregates, events, outbox, REST DTOs, Avro, JPA). Now owned by /sdd-design.
  - name: tasks-template
    file: templates/tasks-template.md
    kind: template
    version: 0.1.0
    description: Atomic TASK-NNN list. Used by /sdd-tasks; consumed by /sdd-implement.
  - name: verify-report-template
    file: templates/verify-report-template.md
    kind: template
    version: 0.1.0
    description: Verification report cross-checking every PRD AC against test evidence. Produced by /sdd-verify. Gate decision blocks spec closure.
  - name: research-template
    file: templates/research-template.md
    kind: template
    version: 0.1.0
    description: Optional time-boxed spike doc. Outcome usually feeds an ADR.
  # Examples (folder per feature)
  - name: loyalty-ledger
    file: examples/loyalty-ledger/
    kind: example
    version: 0.1.0
    description: End-to-end SDD spec example (PRD + ADRs + plan + data-model + tasks) for a hypothetical loyalty-ledger service.
